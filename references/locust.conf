# LLM 压力测试配置文件示例
# 复制此文件并修改参数

# ===========================================
# 基础并发测试配置
# ===========================================

[locust]
# 目标服务地址
host = http://127.0.0.1:8000

# 用户数量 (并发连接数)
users = 100

# 用户生成速率 (用户/秒)
spawn-rate = 10

# 运行时间 (不指定则持续到手动停止)
run-time = 5m

# 无头模式 (不启动Web UI)
headless = true

# ===========================================
# 分布式模式配置
# ===========================================

# 主节点配置
# master = true
# master-bind-host = 0.0.0.0
# master-bind-port = 5557

# 工作节点配置
# worker = true
# master-host = 192.168.1.100
# master-port = 5557

# ===========================================
# 报告输出配置
# ===========================================

# HTML 报告
html = reports/benchmark_report.html

# CSV 统计输出
csv = reports/benchmark_stats

# ===========================================
# 环境变量 (传递给测试脚本)
# ===========================================

[environment]
LLM_MODEL = local-model
LLM_API_KEY = your-api-key-here
MAX_TOKENS_SHORT = 100
MAX_TOKENS_MEDIUM = 256
MAX_TOKENS_LONG = 1024
LLM_STREAMING = false